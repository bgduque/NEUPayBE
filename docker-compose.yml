services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: neupayment
      POSTGRES_USER: neupayment
      POSTGRES_PASSWORD: neupayment
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neupayment"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: neupayment
      DB_USER: neupayment
      DB_PASSWORD: neupayment
      NEU_JWT_SECRET: ${NEU_JWT_SECRET}
      NEU_QR_HMAC_SECRET: ${NEU_QR_HMAC_SECRET}
      NEU_CORS_ALLOWED_ORIGINS: "*"
    ports:
      - "8080:8080"

volumes:
  postgres-data:
