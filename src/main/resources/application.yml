spring:
  application:
    name: neupayment
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  datasource:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 20000
      leak-detection-threshold: 30000

server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true

neu:
  security:
    jwt:
      # Base64-encoded HS512 key (>= 64 bytes raw). Generate one with:
      #   openssl rand -base64 96
      secret: ${NEU_JWT_SECRET:}
      access-token-ttl: PT15M
      refresh-token-ttl: P30D
      step-up-ttl: PT5M
      issuer: neu-payment
    bcrypt-strength: 12
    cors:
      allowed-origins: ${NEU_CORS_ALLOWED_ORIGINS:https://neu.edu.ph}
  qr:
    # HMAC key for signing QR tokens. Independent from JWT secret.
    hmac-secret: ${NEU_QR_HMAC_SECRET:}
    rotation-window: PT2M30S
    image:
      size-px: 360
      margin: 2
  payment:
    max-single-topup: 50000.00
    max-single-payment: 20000.00
  audit:
    enabled: true
  bootstrap:
    # If both email + password are set, an ADMIN user is provisioned on startup
    # iff no ADMIN exists yet. Leave blank after the first deploy and create
    # additional admins via POST /api/v1/admin/staff.
    admin-email: ${NEU_BOOTSTRAP_ADMIN_EMAIL:}
    admin-password: ${NEU_BOOTSTRAP_ADMIN_PASSWORD:}
    admin-id-number: ${NEU_BOOTSTRAP_ADMIN_ID:NEU-ADMIN-0001}
    admin-full-name: ${NEU_BOOTSTRAP_ADMIN_NAME:NEU System Admin}
